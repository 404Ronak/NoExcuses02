<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO EXCUSES — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#0f0f0f;--surface2:#151515;--border:#1e1e1e;--red:#ff2020;--red-glow:rgba(255,32,32,0.15);--red-dim:rgba(255,32,32,0.08);--amber:#ffaa00;--amber-glow:rgba(255,170,0,0.12);--green:#00ff88;--green-dim:rgba(0,255,136,0.08);--white:#f5f5f5;--muted:#555;--subtle:#2a2a2a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;cursor:none;}
#cursor{position:fixed;width:12px;height:12px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(255,32,32,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .12s ease,width .3s,height .3s;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9997;opacity:0.6;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--red);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(8,8,8,0.98),transparent);backdrop-filter:blur(2px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--red);}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--white);}
.nav-links a.active{color:var(--red);}
.streak-badge{display:flex;align-items:center;gap:8px;background:var(--subtle);border:1px solid var(--border);padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--amber);}
.streak-badge::before{content:'🔥';font-size:0.9rem;}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:120px 48px 80px;}

.page-eyebrow{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:4px;color:var(--red);text-transform:uppercase;margin-bottom:10px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,7rem);letter-spacing:3px;line-height:0.95;margin-bottom:48px;}

/* SUMMARY STRIP */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border);margin-bottom:64px;}
.sum-card{background:var(--surface);padding:28px 24px;position:relative;overflow:hidden;transition:background .2s;}
.sum-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:0;background:var(--red);transition:height .4s ease;}
.sum-card:hover{background:var(--surface2);}
.sum-card:hover::before{height:100%;}
.sum-card.green-acc::before{background:var(--green);}
.sum-card.amber-acc::before{background:var(--amber);}
.sum-card.white-acc::before{background:var(--white);}
.sum-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:3px;line-height:1;margin-bottom:6px;}
.sum-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

/* CAL SECTION */
.cal-section{margin-bottom:64px;}

.cal-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.cal-month-label{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px;line-height:1;}
.cal-nav-row{display:flex;gap:4px;align-items:center;}
.cal-nav-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.9rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--red);color:var(--red);}
.cal-today-btn{padding:0 16px;height:36px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;cursor:none;transition:all .15s;}
.cal-today-btn:hover{border-color:var(--white);color:var(--white);}

.cal-grid-wrap{border:1px solid var(--border);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-weekday{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;padding:14px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}

.cal-day{background:var(--surface);min-height:80px;padding:12px;display:flex;flex-direction:column;gap:6px;cursor:none;position:relative;transition:background .15s;overflow:hidden;}
.cal-day::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .2s;}
.cal-day.empty{background:var(--bg);cursor:default;}
.cal-day.future{background:var(--surface);opacity:0.25;cursor:default;}
.cal-day.all-done{background:rgba(0,255,136,0.04);}
.cal-day.all-done::before{background:var(--green);}
.cal-day.has-fail{background:rgba(255,32,32,0.04);}
.cal-day.has-fail::before{background:var(--red);}
.cal-day.partial{background:rgba(255,170,0,0.04);}
.cal-day.partial::before{background:var(--amber);}
.cal-day.is-today{outline:1px solid var(--red);outline-offset:-1px;z-index:1;}
.cal-day:not(.empty):not(.future):hover{background:var(--surface2);}

.day-num{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:1px;color:var(--muted);line-height:1;}
.cal-day.all-done .day-num{color:var(--green);}
.cal-day.has-fail .day-num{color:var(--red);}
.cal-day.partial .day-num{color:var(--amber);}
.cal-day.is-today .day-num{color:var(--white);font-weight:700;}

.day-status-icon{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:1px;}
.cal-day.all-done .day-status-icon{color:var(--green);}
.cal-day.has-fail .day-status-icon{color:var(--red);}

.day-dots{display:flex;gap:2px;flex-wrap:wrap;}
.d-dot{width:5px;height:5px;border-radius:1px;}
.d-dot.done{background:var(--green);}
.d-dot.fail{background:var(--red);}
.d-dot.pending{background:var(--border);}

/* LEGEND */
.legend{display:flex;gap:24px;flex-wrap:wrap;margin-top:16px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.legend-bar{width:16px;height:3px;}

/* MISSED SECTION */
.missed-section{}
.section-eyebrow{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:4px;color:var(--red);text-transform:uppercase;margin-bottom:10px;}
.section-heading{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,4rem);letter-spacing:3px;line-height:1;margin-bottom:32px;}

.missed-list{display:flex;flex-direction:column;gap:2px;}
.missed-item{display:flex;align-items:center;gap:20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);padding:20px 24px;transition:background .2s;}
.missed-item:hover{background:var(--surface2);}
.missed-date{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--white);min-width:180px;}
.missed-stats{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:1px;color:var(--muted);flex:1;}
.missed-badge{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);background:var(--red-dim);border:1px solid rgba(255,32,32,0.25);padding:4px 10px;}

.no-missed{border:1px solid var(--border);padding:48px;text-align:center;position:relative;overflow:hidden;}
.no-missed::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--green-dim) 0%,transparent 70%);pointer-events:none;}
.no-missed-text{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.no-missed-big{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:var(--subtle);margin-bottom:12px;}

/* RESPONSIVE */
@media(max-width:900px){
  nav{padding:16px 24px;}.nav-links{display:none;}
  .page{padding:100px 24px 60px;}
  .summary-strip{grid-template-columns:1fr 1fr;}
  .cal-day{min-height:56px;padding:8px;}
  .day-status-icon{display:none;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <a href="index.html" class="nav-logo">NO<span>·</span>EXCUSES</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="app.html">Tracker</a></li>
    <li><a href="calendar.html" class="active">Calendar</a></li>
    <li><a href="templates.html">AI Tasks</a></li>
  </ul>
  <div class="streak-badge" id="nav-streak">Day 0 Streak</div>
</nav>

<div class="page">

  <div class="page-eyebrow">// Truth doesn't lie</div>
  <div class="page-title">YOUR<br>RECORD.</div>

  <!-- SUMMARY -->
  <div class="summary-strip">
    <div class="sum-card amber-acc">
      <div class="sum-num" id="sum-streak" style="color:var(--amber)">0</div>
      <div class="sum-label">Current streak</div>
    </div>
    <div class="sum-card green-acc">
      <div class="sum-num" id="sum-perfect" style="color:var(--green)">0</div>
      <div class="sum-label">Perfect days</div>
    </div>
    <div class="sum-card">
      <div class="sum-num" id="sum-missed" style="color:var(--red)">0</div>
      <div class="sum-label">Days missed</div>
    </div>
    <div class="sum-card white-acc">
      <div class="sum-num" id="sum-rate" style="color:var(--white)">0%</div>
      <div class="sum-label">Success rate</div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-section">
    <div class="cal-topbar">
      <div class="cal-month-label" id="cal-month">APRIL 2025</div>
      <div class="cal-nav-row">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">←</button>
        <button class="cal-today-btn" onclick="goToday()">Today</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">→</button>
      </div>
    </div>

    <div class="cal-grid-wrap">
      <div class="cal-weekdays">
        <div class="cal-weekday">Sun</div>
        <div class="cal-weekday">Mon</div>
        <div class="cal-weekday">Tue</div>
        <div class="cal-weekday">Wed</div>
        <div class="cal-weekday">Thu</div>
        <div class="cal-weekday">Fri</div>
        <div class="cal-weekday">Sat</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-bar" style="background:var(--green)"></div>All done</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--red)"></div>Had failures</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--amber)"></div>Partial</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--subtle)"></div>No data</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--red);outline:1px solid var(--red)"></div>Today</div>
    </div>
  </div>

  <!-- MISSED DAYS -->
  <div class="missed-section">
    <div class="section-eyebrow">// Face it</div>
    <div class="section-heading">DAYS YOU<br>MISSED.</div>
    <div class="missed-list" id="missed-list"></div>
  </div>

</div>

<script>
const STORAGE_KEY='noexcuse_v2_data';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let viewYear,viewMonth;

function getData(){
  const r=localStorage.getItem(STORAGE_KEY);
  if(!r)return{tasks:[],streak:0,lastDate:null,history:[]};
  try{return JSON.parse(r);}catch{return{tasks:[],streak:0,lastDate:null,history:[]};}
}

function todayStr(){return new Date().toISOString().split('T')[0];}

function getHistoryMap(){
  const d=getData();
  const map={};
  (d.history||[]).forEach(h=>{map[h.date]=h;});
  const today=todayStr();
  if(d.tasks&&d.tasks.length>0){
    const allDone=d.tasks.every(t=>t.status==='done');
    const anyFail=d.tasks.some(t=>t.status==='fail');
    const done=d.tasks.filter(t=>t.status==='done').length;
    const fail=d.tasks.filter(t=>t.status==='fail').length;
    const total=d.tasks.length;
    map[today]={date:today,allDone,anyFail,done,fail,total,isToday:true};
  }
  return map;
}

function init(){
  const now=new Date();
  viewYear=now.getFullYear();
  viewMonth=now.getMonth();
  renderAll();
}

function changeMonth(dir){
  viewMonth+=dir;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  renderCalendar();
}

function goToday(){
  const now=new Date();
  viewYear=now.getFullYear();
  viewMonth=now.getMonth();
  renderCalendar();
}

function renderAll(){
  renderSummary();
  renderCalendar();
  renderMissed();
}

function renderSummary(){
  const d=getData();
  const map=getHistoryMap();
  const allDays=Object.values(map);
  const perfect=allDays.filter(h=>h.allDone).length;
  const missed=allDays.filter(h=>!h.isToday&&(h.anyFail||h.allDone===false)).length;
  const tracked=allDays.filter(h=>!h.isToday).length;
  const rate=tracked>0?Math.round((perfect/tracked)*100):0;
  document.getElementById('sum-streak').textContent=d.streak||0;
  document.getElementById('sum-perfect').textContent=perfect;
  document.getElementById('sum-missed').textContent=missed;
  document.getElementById('sum-rate').textContent=rate+'%';
  document.getElementById('nav-streak').textContent='Day '+(d.streak||0)+' Streak';
}

function renderCalendar(){
  document.getElementById('cal-month').textContent=MONTHS[viewMonth].toUpperCase()+' '+viewYear;
  const map=getHistoryMap();
  const today=todayStr();
  const now=new Date();
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const container=document.getElementById('cal-days');
  container.innerHTML='';

  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div');
    el.className='cal-day empty';
    container.appendChild(el);
  }

  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const isFuture=new Date(dateStr+'T12:00:00')>now&&!isToday;
    const hist=map[dateStr];
    const el=document.createElement('div');
    let cls='cal-day';
    if(isFuture)cls+=' future';
    else if(hist){
      if(hist.allDone)cls+=' all-done';
      else if(hist.anyFail)cls+=' has-fail';
      else cls+=' partial';
    }
    if(isToday)cls+=' is-today';
    el.className=cls;

    let icon='';
    let dots='';
    if(!isFuture&&hist){
      if(hist.allDone)icon='✓';
      else if(hist.anyFail)icon='✗';
      if(hist.total){
        let dotHtml='<div class="day-dots">';
        for(let k=0;k<Math.min(hist.total,6);k++){
          if(k<(hist.done||0))dotHtml+='<div class="d-dot done"></div>';
          else if(k<(hist.done||0)+(hist.fail||0))dotHtml+='<div class="d-dot fail"></div>';
          else dotHtml+='<div class="d-dot pending"></div>';
        }
        dotHtml+='</div>';
        dots=dotHtml;
      }
    }

    el.innerHTML=`<div class="day-num">${day}</div>${icon?`<div class="day-status-icon">${icon}</div>`:''}${dots}`;
    container.appendChild(el);
  }
}

function renderMissed(){
  const map=getHistoryMap();
  const missed=Object.values(map)
    .filter(h=>!h.isToday&&(h.anyFail||h.allDone===false))
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,10);

  const el=document.getElementById('missed-list');
  if(missed.length===0){
    el.innerHTML=`<div class="no-missed"><div class="no-missed-big">CLEAN RECORD</div><div class="no-missed-text">// No missed days recorded yet.<br>Keep it that way.</div></div>`;
    return;
  }

  el.innerHTML=missed.map(h=>{
    const d=new Date(h.date+'T12:00:00');
    const label=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
    const stats=h.done!==undefined?`${h.done||0} done / ${h.fail||0} failed / ${h.total||0} total`:'Had incomplete tasks';
    return `<div class="missed-item">
      <div class="missed-date">${label}</div>
      <div class="missed-stats">${stats}</div>
      <span class="missed-badge">Missed</span>
    </div>`;
  }).join('');
}

/* CURSOR */
const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

init();
</script>
</body>
</html>
